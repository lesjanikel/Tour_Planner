spring.application.name=swen2
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tourplanner}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tourplanner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tourplanner}
spring.jpa.hibernate.ddl-auto=update
app.jwt.secret=${APP_JWT_SECRET:dev-only-insecure-secret-change-me}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:60}
app.images.dir=${APP_IMAGES_DIR:./images}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

clients.ors.base-url=https://api.openrouteservice.org
clients.ors.api-key=${ORS_API_KEY:}
clients.ors.connect-timeout-ms=2000
clients.ors.read-timeout-ms=5000
