<div class="min-h-screen flex flex-col">
  <app-navbar></app-navbar>
  <main class="flex-1">
    <router-outlet></router-outlet>
    <div class="fixed bottom-4 right-4 flex flex-col gap-2 z-[2000]">
      @for (t of toastService.toasts(); track t.id) {
        <div
          class="px-4 py-2 rounded shadow text-white min-w-[200px]"
          [class.bg-red-600]="t.kind === 'error'"
          [class.bg-green-600]="t.kind === 'success'"
          [class.bg-gray-700]="t.kind === 'info'"
          (click)="toastService.dismiss(t.id)">
          {{ t.message }}
        </div>
      }
    </div>
  </main>
  <app-footer></app-footer>
</div>
