<div class="flex justify-center items-center py-20">
  <div class="bg-gray-200 p-10 rounded w-80">
    <h2 class="text-xl text-center mb-6">Register</h2>
    <app-error-list [errors]="errors" />
    <form (ngSubmit)="register()" class="space-y-4">
      <div>
        <label class="block text-sm mb-1">username</label>
        <input [(ngModel)]="username" name="username" class="w-full border rounded px-3 py-2" />
      </div>
      <div>
        <label class="block text-sm mb-1">password</label>
        <input [(ngModel)]="password" name="password" type="password" class="w-full border rounded px-3 py-2" />
      </div>
      <div>
        <label class="block text-sm mb-1">re-enter password</label>
        <input [(ngModel)]="passwordConfirm" name="passwordConfirm" type="password" class="w-full border rounded px-3 py-2" />
      </div>
      <div class="flex items-center gap-2">
        <input [(ngModel)]="accepted" name="accepted" type="checkbox" />
        <label class="text-sm">I accept the user agreement</label>
      </div>
      <button type="submit" class="w-full bg-gray-600 text-white py-2 rounded">Create account</button>
    </form>
  </div>
</div>
