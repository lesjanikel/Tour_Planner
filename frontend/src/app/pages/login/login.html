<div class="flex justify-center items-center py-20">
  <div class="bg-gray-200 p-10 rounded w-80">
    <h2 class="text-xl text-center mb-6">Login</h2>
    <form [formGroup]="form" (ngSubmit)="login()" class="space-y-4">
      <div>
        <label class="block text-sm mb-1">username</label>
        <input formControlName="username" name="username" class="w-full border rounded px-3 py-2" />
        @if (
          form.controls.username.touched &&
          form.controls.username.errors?.['required']
          ) {
          <p class="text-red-600 text-sm mt-1">
            Username is required.
          </p>
        }
      </div>
      <div>
        <label class="block text-sm mb-1">password</label>
        <input formControlName="password" name="password" type="password" class="w-full border rounded px-3 py-2" />
        @if (
          form.controls.password.touched &&
          form.controls.password.errors?.['required']
          ) {
          <p class="text-red-600 text-sm mt-1">
            Password is required.
          </p>
        }
      </div>
      <button type="submit" class="w-full bg-gray-600 text-white py-2 rounded">Log in</button>
      <p class="text-sm text-center">Haven't any account yet? You can <a routerLink="/register" class="text-blue-600 cursor-pointer">register here</a></p>
    </form>
  </div>
</div>
