<div class="bg-gray-200 p-6 mb-4 rounded-lg flex justify-center gap-32">
  <div class="text-center flex flex-col">
    <div>
      <p class="text-xl font-semibold text-gray-800">{{ totalDistance()| number:'1.1-1' }} km</p>
      <p class="text-xs uppercase tracking-wide text-gray-500">travelled</p>
    </div>
    <div class="flex-1"></div>
    <div>
      <p class="text-xl font-semibold text-gray-800">{{ totalTime() }}h</p>
      <p class="text-xs uppercase tracking-wide text-gray-500">total time</p>
    </div>
  </div>

  <app-achievements [achievements]="achievements()"></app-achievements>
</div>

<div class="max-w-3xl mx-auto p-4">
  <div class="flex gap-4 mb-4">
    <input [ngModel]="search()"
           (ngModelChange)="updateSearch($event)"
           name="search" placeholder="Search Box" class="flex-1 border px-3 py-2 rounded" />
    <div class="flex gap-2 items-center bg-gray-200 px-4 py-2 rounded">
      <label class="flex items-center gap-1 text-sm">
        <input type="checkbox" (change)="filterChildFriendly.set($event.target.checked)" />
        Child-friendly
      </label>
      <label class="flex items-center gap-1 text-sm">
        <input type="checkbox" (change)="filterPopular.set($event.target.checked)" />
        Popular
      </label>
    </div>
    <label class="bg-gray-200 px-4 py-2 rounded cursor-pointer">
      Import Tour
      <input
        type="file"
        accept=".json"
        hidden
        (change)="importTour($event)"
      />
    </label>
    <button type="button" (click)="exportAllTours()" class="bg-gray-200 px-4 py-2 rounded">Export All</button>
  </div>

  @for (tour of filteredTours(); track tour.id) {
    <div class="flex mb-3" >
      <div class="flex-1 bg-gray-200 p-4 flex items-center hover:bg-gray-400" (click)="detail(tour.id)">
        <span class="text-xl">{{ tour.name }}</span>
      </div>
      <div class="bg-gray-300 flex flex-col justify-center text-sm">
        <button (click)="edit(tour.id)" class="hover:underline hover:bg-gray-400 flex-1 px-4">Edit</button>
        <button (click)="delete(tour.id)" class="hover:underline hover:bg-gray-400 flex-1 px-4">Delete</button>
      </div>
    </div>
  }
</div>

<app-confirm-modal
  [visible]="deleteTarget() !== null"
  message="Are you sure you want to delete this tour?"
  (yes)="confirmDelete()"
  (no)="deleteTarget.set(null)" />
