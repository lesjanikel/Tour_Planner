<div class="flex justify-center items-center py-20">
  <div class="bg-gray-200 p-10 rounded max-w-2xl w-full">
    <h1 class="text-2xl font-bold mb-6">Contact Us</h1>

    <p class="text-gray-600 mb-6">
      Have a question, found a bug, or want to share feedback? We are happy to hear from you.
    </p>

    <p class="text-gray-600 mb-6">
      You can use the form below or reach out to us directly via email.
    </p>

    <p class="text-gray-600 mb-4">
      <span class="font-medium">Response time:</span>
      We aim to respond within 2 business days.
    </p>

    <form class="space-y-4">
      <input type="text" placeholder="Name" class="w-full p-2 rounded border" required>
      <input type="email" placeholder="Email" class="w-full p-2 rounded border" required>
      <textarea rows="4" placeholder="Message" class="w-full p-2 rounded border" required></textarea>
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">
        Send
      </button>
    </form>

  </div>
</div>
