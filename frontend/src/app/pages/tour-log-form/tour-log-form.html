<div class="max-w-xl mx-auto p-6">
  <h1 class="text-2xl font-bold mb-6">{{ isEdit ? 'Log bearbeiten' : 'Neuer Log' }}</h1>

  <app-error-list [errors]="errors" />

  <form (ngSubmit)="save()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">Datum</label>
      <input [(ngModel)]="log.date" name="date" type="date" class="w-full border rounded px-3 py-2" required />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Kommentar</label>
      <textarea [(ngModel)]="log.comment" name="comment" class="w-full border rounded px-3 py-2"></textarea>
    </div>
    <div class="flex gap-4">
      <div class="flex-1">
        <label class="block text-sm font-medium mb-1">Distanz (km)</label>
        <input [(ngModel)]="log.totalDistance" name="totalDistance" type="number" class="w-full border rounded px-3 py-2" />
      </div>
      <div class="flex-1">
        <label class="block text-sm font-medium mb-1">Zeit (min)</label>
        <input [(ngModel)]="log.totalTime" name="totalTime" type="number" class="w-full border rounded px-3 py-2" />
      </div>
    </div>
    <div class="flex gap-4">
      <div class="flex-1">
        <label class="block text-sm font-medium mb-1">Schwierigkeit (1-5)</label>
        <input [(ngModel)]="log.difficulty" name="difficulty" type="number" min="1" max="5" class="w-full border rounded px-3 py-2" />
      </div>
      <div class="flex-1">
        <label class="block text-sm font-medium mb-1">Bewertung (1-5)</label>
        <input [(ngModel)]="log.rating" name="rating" type="number" min="1" max="5" class="w-full border rounded px-3 py-2" />
      </div>
    </div>
    <div class="flex gap-3 pt-2">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Speichern</button>
      <button type="button" (click)="cancel()" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">Abbrechen</button>
    </div>
  </form>
</div>
