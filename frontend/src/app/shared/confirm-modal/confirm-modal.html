@if (visible()) {
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" (click)="no.emit()">
    <div class="bg-white rounded shadow-lg p-6 max-w-sm mx-4" (click)="$event.stopPropagation()">
      <p class="text-lg font-semibold mb-4">{{ message() }}</p>
      <div class="flex justify-end gap-3">
        <button (click)="no.emit()" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Cancel</button>
        <button (click)="yes.emit()" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
      </div>
    </div>
  </div>
}
